query UsersStream($ids: [ID!], $logins: [String!]) {
    users(ids: $ids, logins: $logins) {
        displayName
        id
        login
        profileImageURL(width: 300)
        stream {
            broadcaster {
                broadcastSettings {
                    title
                }
            }
            createdAt
            freeformTags {
                name
            }
            game {
                displayName
                id
                slug
            }
            id
            previewImageURL
            viewersCount
        }
    }
}
